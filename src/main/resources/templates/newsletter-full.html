<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>오늘의 뉴스레터</title>
</head>
<body style="margin:0;padding:24px 16px;background:#f0f2f5;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:#222;">
<div style="max-width:680px;margin:0 auto;background:white;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.09);">

    <!-- 헤더 -->
    <div style="background:linear-gradient(135deg,#1a1a2e 0%,#2d3561 100%);color:white;padding:40px 36px;text-align:center;">
        <h1 style="margin:0;font-size:24px;font-weight:700;">&#128240; 오늘의 뉴스레터</h1>
        <p style="margin:8px 0 0;font-size:13px;opacity:0.6;">매일 새롭게 큐레이션된 뉴스를 전달해드립니다</p>
    </div>

    <!-- 뉴스 목록 -->
    <div th:each="item : ${newsList}" style="padding:24px 32px;border-bottom:1px solid #f0f0f0;">

        <!-- 배지 + 제목 (table로 수직 중앙 정렬) -->
        <table cellpadding="0" cellspacing="0" border="0" style="width:100%;margin-bottom:14px;">
            <tr>
                <!-- 배지 -->
                <td style="vertical-align:middle;width:1%;white-space:nowrap;padding-right:14px;">
                    <span th:text="${item.category}"
                          th:style="${item.category == '사회'}    ? 'display:inline-block;background:#e8f4fd;color:#1a6fa8;padding:5px 12px;border-radius:6px;font-size:15px;font-weight:700;' :
                                    (${item.category == '경제'}   ? 'display:inline-block;background:#e6f9f0;color:#1a7a4a;padding:5px 12px;border-radius:6px;font-size:15px;font-weight:700;' :
                                    (${item.category == '정치'}   ? 'display:inline-block;background:#fdf0e8;color:#a8521a;padding:5px 12px;border-radius:6px;font-size:15px;font-weight:700;' :
                                    (${item.category == 'IT&기술'} ? 'display:inline-block;background:#f0e8fd;color:#6a1aa8;padding:5px 12px;border-radius:6px;font-size:15px;font-weight:700;' :
                                                                    'display:inline-block;background:#fde8f0;color:#a81a5a;padding:5px 12px;border-radius:6px;font-size:15px;font-weight:700;')))">
                        카테고리
                    </span>
                </td>
                <!-- 제목 -->
                <td style="vertical-align:middle;">
                    <span th:text="${item.title}"
                          style="font-size:15px;font-weight:700;color:#1a1a2e;line-height:1.5;">제목</span>
                </td>
            </tr>
        </table>

        <!-- 본문 -->
        <p th:text="${item.body}"
           style="margin:0;font-size:14px;line-height:1.85;color:#555;white-space:pre-line;">내용</p>
    </div>

    <!-- 푸터 -->
    <div style="background:#f8f9fa;text-align:center;padding:20px;font-size:12px;color:#bbb;">
        본 뉴스레터는 AI가 생성한 콘텐츠입니다. 실제 뉴스와 다를 수 있습니다.
    </div>
</div>
</body>
</html>
